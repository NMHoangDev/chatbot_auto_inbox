worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
}

http {
    # Conditional WebSocket upgrade — proxy_set_header Connection cần map này
    # để KHÔNG gửi "Upgrade" cho request HTTP thường (gây 400 ở một số upstream).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Tắt gzip cho SSE / streaming.
    gzip off;

    server {
        listen 8080;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ──────────────────────────────────────────────────────────────────────
        # Zalo bridge — mount dưới prefix /zalo-bridge/ để nginx forward tới
        # container `zalo-bridge:3001`. Bridge tự hỗ trợ cả path gốc và path
        # có prefix `/zalo-bridge` (xem services/zalo-bridge/src/index.js —
        # mount router 2 lần, root + dưới `/zalo-bridge/*`), nên giữ nguyên
        # prefix khi proxy, không cần rewrite bỏ prefix.
        #
        # QUAN TRỌNG: browser (EventSource, extension) gọi bridge TRỰC TIẾP
        # qua NEXT_PUBLIC_ZALO_BRIDGE_URL — phải trỏ domain public + prefix
        # /zalo-bridge này (xem docker-compose.yml build args), không phải
        # internal docker hostname.
        # ──────────────────────────────────────────────────────────────────────

        # SSE — tắt buffering để event real-time reach browser ngay lập tức.
        location ~ ^/zalo-bridge/api/all-platform/zalo/events {
            proxy_pass http://zalo-bridge:3001;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        # Mọi request Zalo bridge còn lại (auth/QR, accounts, send-media...) —
        # long timeout để chờ login QR / upload file lớn.
        location /zalo-bridge/ {
            proxy_pass http://zalo-bridge:3001;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            client_max_body_size 50M;
        }

        # ──────────────────────────────────────────────────────────────────────
        # Next.js frontend — default. App Router có RSC streaming → cũng cần
        # tắt buffering để response gửi incremental.
        # ──────────────────────────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            client_max_body_size 50M;
        }
    }
}
