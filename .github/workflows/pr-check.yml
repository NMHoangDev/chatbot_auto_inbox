name: PR Build Check

# Kiem tra frontend + zalo-bridge build/typecheck duoc TRUOC khi merge PR vao
# main. CHI build-check, KHONG deploy len bat ky host nao - chay tren runner
# GitHub-hosted (ubuntu-latest).
on:
  pull_request:
    branches:
      - main

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Build (kiem tra loi Next.js/TypeScript/syntax)
        run: npm run build
        env:
          # Gia tri gia - chi de build khong bi crash khi doc process.env,
          # KHONG phai secret thuc. App khong ket noi Supabase luc build (chi
          # ket noi khi co request thuc, API routes lazy-init client).
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_ZALO_BRIDGE_URL: http://localhost:3001
          NEXT_PUBLIC_ZALO_ACCOUNT_ID: shop-owner

  build-zalo-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/zalo-bridge/package-lock.json

      - name: Install dependencies (bao gom local dep zca-js)
        working-directory: services/zalo-bridge
        run: npm ci

      - name: Syntax-check toan bo source (khong co tsc, JS thuan)
        working-directory: services/zalo-bridge
        run: |
          find src -name "*.js" -print0 | xargs -0 -n1 node --check
